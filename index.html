<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Moderna</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <h1>Tabuada Dinâmica</h1>
            <p>Digite um número para gerar o resultado instantaneamente</p>
        </header>


        <section class="card">
            <form id="form-tabuada">
                <div class="form-group">
                    <label for="txtn">Número:</label>
                    <div class="input-block">
                        <input type="number" id="txtn" placeholder="Ex: 7" required>
                        <button type="submit">Gerar Tabuada</button>
                    </div>
                </div>
            </form>

            <div class="result-group">
                <select id="seltab" size="10">
                    <option disabled selected>O resultado aparecerá aqui...</option>
                </select>
            </div>
        </section>

        <footer>
            <p>&copy; Desenvolvido inspirado no Curso em Vídeo</p>
        </footer>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
